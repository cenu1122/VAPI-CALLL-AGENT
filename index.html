<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Balkan Translator PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #22c55e; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border-radius: 10px; padding: 10px; background: #1e293b; color: white; border: 1px solid #334155; box-sizing: border-box; font-size: 16px; }
        button { padding: 12px 20px; margin: 5px; border-radius: 10px; border: none; background: #22c55e; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Balkan Translator PRO</h1>
        <textarea id="input" placeholder="Unesi tekst..."></textarea>
        <button onclick="translateText()">Prevedi</button>
        <textarea id="output" placeholder="Rezultat..." readonly></textarea>
    </div>

    <script>
      (function (d, t) {
        var g = d.createElement(t),
          s = d.getElementsByTagName(t)[0];
        g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
        g.defer = true;
        g.async = true;
        s.parentNode.insertBefore(g, s);

        g.onload = function () {
          window.vapiSDK.run({
            apiKey: "2af4a659-dfb7-43a7-9d52-999b39bd2", // Tvoj Public Key
            assistant: "354b3db7-9dda-4af4-9323-d8dc2206bf4d", // Tvoj Assistant ID
            config: {
              position: "bottom-right",
              title: "Nusretov AI",
              color: "#22c55e",
            },
          });
        };
      })(document, "script");

      async function translateText() {
          let text = document.getElementById("input").value;
          if(!text) return;
          try {
              let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=bs&dt=t&q=${encodeURIComponent(text)}`);
              let data = await res.json();
              document.getElementById("output").value = data[0][0][0];
          } catch(e) { alert("Greška u prevodu"); }
      }
    </script>
</body>
</html>
