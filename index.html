<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Balkan Translator PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #22c55e; }
        textarea { width: 100%; height: 100px; margin: 10px 0; border-radius: 10px; padding: 10px; background: #1e293b; color: white; border: 1px solid #334155; }
        button { padding: 12px 20px; margin: 5px; border-radius: 10px; border: none; background: #22c55e; color: white; cursor: pointer; font-weight: bold; }
        #aiBtn { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 50px; background: #64748b; color: white; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 9999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌍 Balkan Translator PRO</h1>
        <textarea id="input" placeholder="Unesi tekst..."></textarea>
        <button onclick="translateText()">Prevedi</button>
        <textarea id="output" placeholder="Rezultat..." readonly></textarea>
    </div>

    <button id="aiBtn">⏳ Učitavam AI...</button>

    <script src="https://unpkg.com/@vapi-ai/web"></script>

    <script>
        const assistantId = "354b3db7-9dda-4af4-9323-d8dc2206bf4d";
        const apiKey = "2af4a659-dfb7-43a7-9d52-999b39bd2";
        const btn = document.getElementById('aiBtn');
        let vapiInstance = null;

        // Funkcija koja uporno pokušava da inicijalizuje Vapi
        function initVapi() {
            if (typeof Vapi !== 'undefined') {
                vapiInstance = new Vapi(apiKey);
                btn.innerHTML = "💬 Pričaj sa AI";
                btn.style.backgroundColor = "#3b82f6";
                
                btn.onclick = () => {
                    vapiInstance.start(assistantId);
                    btn.innerHTML = "🔴 Povezivanje...";
                    btn.style.backgroundColor = "#ef4444";
                };

                vapiInstance.on('call-start', () => { btn.innerHTML = "🔴 Slušam..."; });
                vapiInstance.on('call-end', () => { 
                    btn.innerHTML = "💬 Pričaj sa AI"; 
                    btn.style.backgroundColor = "#3b82f6";
                });
                
                console.log("Vapi uspješno inicijalizovan!");
            } else {
                console.log("Vapi se još čeka...");
                setTimeout(initVapi, 500); // Pokušaj ponovo za pola sekunde
            }
        }

        // Pokreni provjeru
        initVapi();

        async function translateText() {
            let text = document.getElementById("input").value;
            if(!text) return;
            try {
                let res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=bs&dt=t&q=${encodeURIComponent(text)}`);
                let data = await res.json();
                document.getElementById("output").value = data[0][0][0];
            } catch(e) { alert("Greška u prevodu"); }
        }
    </script>
</body>
</html>
